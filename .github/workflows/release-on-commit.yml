name: Release on Commit

on:
  push:
    branches: [ main ]

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Get rule counts
        id: counts
        run: |
          # Read last SID from tracker (assumed to be the total number of SIDs allocated)
          if [ -f sid_tracker.txt ]; then
            SID=$(cat sid_tracker.txt)
          else
            echo "sid_tracker.txt not found, defaulting SID to 0"
            SID=0
          fi
          # HTTP rules count is total SIDs minus the two DNS/TLS rules
          HTTP=$((SID - 2))
          # Count number of lines in phishing.lst (each line represents a vector)
          if [ -f phishing.lst ]; then
            LINES=$(wc -l < phishing.lst)
          else
            echo "phishing.lst not found, defaulting line count to 0"
            LINES=0
          fi
          TLS=$LINES
          DNS=$LINES
          echo "http=$HTTP" >> $GITHUB_OUTPUT
          echo "tls=$TLS" >> $GITHUB_OUTPUT
          echo "dns=$DNS" >> $GITHUB_OUTPUT
          echo "vectors=$LINES" >> $GITHUB_OUTPUT
      - name: Compute total rule count
        id: total
        run: |
          echo "total=$(( ${{ steps.counts.outputs.http }} + ${{ steps.counts.outputs.tls }} + ${{ steps.counts.outputs.dns }} ))" >> $GITHUB_OUTPUT

      
      - name: Set release timestamp
        id: timestamp
        run: |
          echo "time=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "release-${{ github.run_id }}"
          name: "Release ${{ steps.timestamp.outputs.time }}"
          files: |
            antiphishing.tar.gz
            antiphishing.rules
            antiphishing.rules.md5
          body: |
            | Rule type | Number of rules | Documentation |
            |---|---|---|
            | HTTP | ${{ steps.counts.outputs.http }} | [HTTP Keywords](https://docs.suricata.io/en/latest/rules/http-keywords.html) |
            | TLS | ${{ steps.counts.outputs.tls }} | [SSL/TLS Keywords](https://docs.suricata.io/en/latest/rules/tls-keywords.html) |
            | DNS | ${{ steps.counts.outputs.dns }} | [DNS Keywords](https://docs.suricata.io/en/latest/rules/dns-keywords.html) |
            | **TOTAL** | **${{ steps.total.outputs.total }}** |

            **Vectors added in this commit:** ${{ steps.counts.outputs.vectors }}

            ![Antiphishing logo](img/antiphishing.png)

            ![GitHub commit activity](https://img.shields.io/github/commit-activity/w/julioliraup/Antiphishing) ![GitHub commit activity](https://img.shields.io/github/commit-activity/t/julioliraup/Antiphishing)

            [ [DONATE](./FUNDING.md) - [DASHBOARD VECTORS](https://julioliraup.github.io/AT) - [CONTRIBUTING](./CONTRIBUTING.md) - [SUBMIT A VECTOR](/julioliraup/Antiphishing/issues/new?q=state%3Aopen+label%3A%22Phishing+Vector%22) - [REST API CTI](https://github.com/julioliraup/AT/wiki/REST-API-USE) - [WIKI](/julioliraup/Antiphishing/wiki) ]

            > Protect against phishing attacks

            # Functionality

            This rule is built using malicious URLs and domains involved in phishing attacks. We utilize some community APIs to construct these rules, and with them, we create TLS, DNS, and HTTP rules.

            Our sources:
            1. [Phishstats](https://phishstats.info)
            2. [Openphish](https://openphish.com/)

            Contribution: [CONTRIBUTING.md](https://github.com/julioliraup/Antiphishing/blob/main/CONTRIBUTING.md)

            ![Antiphishing video](https://github.com/user-attachments/assets/32c89d48-f88c-4983-86ff-a17b8d6dcbd9)
            
            # General info
            The ruleset is the `antiphishing.rules` file, which contains two rules (TLS, DNS) that depend on a `phishing.lst` list. Finally, there is another file named `antiphishing.rules.md5` for integrity verification. We provide a compressed file containing these mentioned files, which are constantly updated without changing the URL (tar.gz):

          ```
          https://github.com/julioliraup/Antiphishing/raw/refs/heads/main/antiphishing.tar.gz
          ```
          Dot rules file:

          ```
          https://github.com/julioliraup/Antiphishing/raw/refs/heads/main/antiphishing.rules
          ```
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
