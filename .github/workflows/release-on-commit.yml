name: Release on Commit

on:
  push:
    branches: [ main ]

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Get rule counts
        id: counts
        run: |
          # Read last SID from tracker (assumed to be the total number of SIDs allocated)
          if [ -f sid_tracker.txt ]; then
            SID=$(cat sid_tracker.txt)
          else
            echo "sid_tracker.txt not found, defaulting SID to 0"
            SID=0
          fi
          # HTTP rules count is total SIDs minus the two DNS/TLS rules
          HTTP=$((SID - 2))
          # Count number of lines in phishing.lst (each line represents a vector)
          if [ -f phishing.lst ]; then
            LINES=$(wc -l < phishing.lst)
          else
            echo "phishing.lst not found, defaulting line count to 0"
            LINES=0
          fi
          TLS=$LINES
          DNS=$LINES
          echo "http=$HTTP" >> $GITHUB_OUTPUT
          echo "tls=$TLS" >> $GITHUB_OUTPUT
          echo "dns=$DNS" >> $GITHUB_OUTPUT
          echo "vectors=$LINES" >> $GITHUB_OUTPUT
      - name: Compute TLD counts
        id: tld_counts
        run: |
          python3 - <<'PY'
          import base64, collections, os
          tld_counts = collections.Counter()
          if os.path.isfile('phishing.lst'):
              with open('phishing.lst') as f:
                  for line in f:
                      line = line.strip()
                      if not line:
                          continue
                      domain = base64.b64decode(line).decode()
                      tld = domain.split('.')[-1].lower()
                      tld_counts[tld] += 1
          tlds = sorted(tld_counts)
          header = "| Rule Type | Count " + " ".join(f"| {t.upper()} " for t in tlds) + "|"
          separator = "|---|---" + "".join("|---" for _ in tlds) + "|"
          rows = []
          for rt in ['HTTP', 'TLS', 'DNS']:
              rows.append(f"| {rt} | ${{{{ steps.counts.outputs.{rt.lower()} }}}} " + " ".join(f"| {tld_counts.get(t,0)} " for t in tlds) + "|")
          rows.append(f"| TOTAL | ${{{{ steps.total.outputs.total }}}} " + " ".join(f"| {tld_counts.get(t,0)} " for t in tlds) + "|")
          table = "\n".join([header, separator] + rows)
          import os
          with open(os.environ['GITHUB_OUTPUT'], 'a') as fh:
              fh.write("tld_table<<EOF\n")
              fh.write(table + "\n")
              fh.write("EOF\n")
          PY
        shell: bash
      - name: Compute total rule count
        id: total
        run: |
          echo "total=$(( ${{ steps.counts.outputs.http }} + ${{ steps.counts.outputs.tls }} + ${{ steps.counts.outputs.dns }} ))" >> $GITHUB_OUTPUT

      - name: Set release timestamp
        id: timestamp
        run: |
          echo "time=$(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "release-${{ github.run_id }}"
          name: "Release ${{ steps.timestamp.outputs.time }}"
          body: |
            | Rule Type | Count | .com | .net | .org |
            |---|---|---|---|---|
            | HTTP | ${{ steps.counts.outputs.http }} | N/A | N/A | N/A |
            | TLS | ${{ steps.counts.outputs.tls }} | N/A | N/A | N/A |
            | DNS | ${{ steps.counts.outputs.dns }} | N/A | N/A | N/A |
            | TOTAL | ${{ steps.total.outputs.total }} | N/A | N/A | N/A |
            
            **Vectors added in this commit:** ${{ steps.counts.outputs.vectors }}

            ![GitHub commit activity](https://img.shields.io/github/commit-activity/w/julioliraup/Antiphishing) ![GitHub commit activity](https://img.shields.io/github/commit-activity/t/julioliraup/Antiphishing)

            ![Antiphishing logo](img/antiphishing.png)

            [ [DONATE](/julioliraup/Antiphishing/FUNDING.md) [DASHBOARD VECTORS](https://julioliraup.github.io/AT) [CONTRIBUTING](/julioliraup/Antiphishing/CONTRIBUTING.md) [WIKI](/julioliraup/Antiphishing/wiki) [SUBMIT A PHISHING VECTOR](/julioliraup/Antiphishing/issues/new?q=state%3Aopen+label%3A%22Phishing+Vector%22) ]
            
            > Protect against phishing attacks

            # Functionality

            This rule is built using malicious URLs and domains involved in phishing attacks. We utilize some community APIs to construct these rules, and with them, we create TLS, DNS, and HTTP rules.

            Our sources:
            1. [Phishstats](https://phishstats.info)
            2. [Openphish](https://openphish.com/)

            Contribution: [CONTRIBUTING.md](https://github.com/julioliraup/Antiphishing/blob/main/CONTRIBUTING.md)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
